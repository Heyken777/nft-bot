<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeykenVPN — Космический вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(ellipse at bottom, #0a0a1a 0%, #050510 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration, 3s) ease-in-out infinite;
            box-shadow: 0 0 4px rgba(255,255,255,0.8);
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }
        
        .planet {
            position: fixed;
            bottom: -150px;
            right: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle at 30% 30%, rgba(255,100,50,0.2), rgba(255,50,30,0.05));
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            animation: float 25s ease-in-out infinite;
        }
        
        .planet-small {
            position: fixed;
            top: 20%;
            left: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle at 30% 30%, rgba(0,200,255,0.15), rgba(0,100,200,0.05));
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            animation: float 35s ease-in-out infinite reverse;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-30px, -30px) rotate(5deg); }
        }
        
        .login-card {
            background: rgba(8, 12, 25, 0.95);
            backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 48px;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.15);
            z-index: 1;
            transition: all 0.3s;
        }
        
        .login-card:hover {
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 70px rgba(0, 255, 255, 0.25);
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff0066, #ff6600, #ffcc00, #00ffcc, #0066ff, #6600cc);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 8s ease infinite;
            text-align: center;
            margin-bottom: 8px;
        }
        
        @keyframes rainbow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .subtitle {
            text-align: center;
            color: #00ffcc;
            font-size: 12px;
            margin-bottom: 32px;
            opacity: 0.7;
            letter-spacing: 2px;
        }
        
        .neon-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 10, 25, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 16px;
            color: white;
            margin-bottom: 16px;
            transition: all 0.3s;
            font-size: 16px;
        }
        
        .neon-input:focus {
            outline: none;
            border-color: #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
            background: rgba(0, 20, 40, 0.8);
        }
        
        .neon-input::placeholder {
            color: rgba(0, 255, 255, 0.4);
        }
        
        .neon-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00a3ff, #0066cc);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }
        
        .neon-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 163, 255, 0.6);
        }
        
        .error {
            color: #ff4757;
            text-align: center;
            margin-top: 16px;
            display: none;
        }
        
        .toast-custom {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #00a3ff, #0066cc);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 1100;
            animation: slideIn 0.3s ease;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 163, 255, 0.5);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="planet"></div>
    <div class="planet-small"></div>
    
    <div class="login-card">
        <div class="text-center mb-3">
            <i class="fas fa-meteor" style="font-size: 48px; color: #00a3ff; filter: drop-shadow(0 0 10px #00a3ff);"></i>
        </div>
        <h1>HeykenVPN</h1>
        <div class="subtitle">✦ COSMIC ADMIN v3.0 ✦</div>
        
        <form onsubmit="login(event)">
            <input type="text" id="username" class="neon-input" placeholder="🚀 Логин" required autocomplete="off">
            <input type="password" id="password" class="neon-input" placeholder="🔑 UUID-ключ" required>
            <button type="submit" class="neon-button">
                <i class="fas fa-rocket me-2"></i> Войти в систему
            </button>
        </form>
        
        <div id="error" class="error"></div>
    </div>

    <script>
        function generateStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 250; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2.5 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', Math.random() * 4 + 1 + 's');
                star.style.opacity = Math.random() * 0.6 + 0.2;
                starsContainer.appendChild(star);
            }
        }
        generateStars();
        
        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast-custom';
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function login(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
    
                if (data.success) {
                    localStorage.setItem('admin_token', data.token);
                    localStorage.setItem('admin_username', data.username);
                    showToast('🚀 Добро пожаловать в космос!', 'success');
                    setTimeout(() => window.location.href = '/dashboard/', 500);
                } else {
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error').innerText = data.error || 'Неверный логин или пароль';
                }
            } catch (err) {
                showToast('❌ Ошибка соединения', 'error');
            }}
    </script>
</body>
</html>
