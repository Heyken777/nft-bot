<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeykenVPN — Космический вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(ellipse at bottom, #07070f 0%, #0d0d1a 30%, #1a0a1e 70%, #0a0e17 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration, 3s) ease-in-out infinite;
            box-shadow: 0 0 4px rgba(255,255,255,0.8);
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }
        
        .planet {
            position: fixed;
            bottom: -150px;
            right: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle at 30% 30%, rgba(255,100,50,0.12), rgba(255,50,30,0.03));
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            animation: float 25s ease-in-out infinite;
        }
        
        .planet-small {
            position: fixed;
            top: 20%;
            left: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle at 30% 30%, rgba(0,200,255,0.1), rgba(0,100,200,0.03));
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            animation: float 35s ease-in-out infinite reverse;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-30px, -30px) rotate(5deg); }
        }
        
        .login-card {
            background: rgba(15, 15, 25, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 48px;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.45);
            z-index: 1;
            transition: all 0.35s;
        }
        
        .login-card:hover {
            border-color: rgba(255, 0, 102, 0.25);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.55), 0 0 30px rgba(255, 0, 102, 0.06);
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff0066, #ff6600, #ffcc00, #00ffcc, #0066ff, #6600cc);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 8s ease infinite;
            text-align: center;
            margin-bottom: 8px;
        }
        
        @keyframes rainbow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-bottom: 32px;
            opacity: 0.6;
            letter-spacing: 2px;
        }
        
        .neon-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(20, 20, 35, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: white;
            margin-bottom: 16px;
            transition: all 0.3s;
            font-size: 16px;
        }
        
        .neon-input:focus {
            outline: none;
            border-color: rgba(255, 0, 102, 0.5);
            box-shadow: 0 0 20px rgba(255, 0, 102, 0.15);
            background: rgba(20, 20, 35, 0.8);
        }
        
        .neon-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .neon-button {
            width: 100%;
            padding: 14px;
            background: rgba(255, 0, 102, 0.8);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 0, 102, 0.3);
            border-radius: 16px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }
        
        .neon-button:hover {
            transform: translateY(-2px);
            background: rgba(255, 0, 102, 0.95);
            box-shadow: 0 0 25px rgba(255, 0, 102, 0.5), 0 0 50px rgba(255, 0, 102, 0.2);
        }
        
        .error {
            color: #ff4757;
            text-align: center;
            margin-top: 16px;
            display: none;
        }
        
        .toast-custom {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 0, 102, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 1100;
            animation: slideIn 0.3s ease;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="planet"></div>
    <div class="planet-small"></div>
    
    <div class="login-card">
        <div class="text-center mb-3">
            <i class="fas fa-meteor" style="font-size: 48px; color: #00a3ff; filter: drop-shadow(0 0 10px #00a3ff);"></i>
        </div>
        <h1>HeykenVPN</h1>
        <div class="subtitle">✦ COSMIC ADMIN v3.0 ✦</div>
        
        <!-- ШАГ 1: логин + пароль -->
        <div id="step1">
            <form onsubmit="login(event)">
                <input type="text" id="username" class="neon-input" placeholder="Логин" required autocomplete="off">
                <input type="password" id="password" class="neon-input" placeholder="UUID-ключ" required>
                <button type="submit" class="neon-button">
                    <i class="fas fa-rocket me-2"></i> Войти в систему
                </button>
            </form>
        </div>

        <!-- ШАГ 2: код из Telegram -->
        <div id="step2" style="display:none;">
            <div class="subtitle" style="color:rgba(255,255,255,0.6);margin-bottom:12px;">
                <i class="fas fa-shield-alt me-1"></i> Код отправлен в Telegram
            </div>
            <div class="text-center" style="color:rgba(255,255,255,0.35);font-size:12px;margin-bottom:18px;">
                Введите 6-значный код из сообщения бота
            </div>
            <form onsubmit="verifyCode(event)">
                <input type="text" id="codeInput" class="neon-input" placeholder="000000" maxlength="6"
                       autocomplete="off" inputmode="numeric" pattern="[0-9]*"
                       style="text-align:center;font-size:28px;letter-spacing:8px;font-weight:700;">
                <button type="submit" class="neon-button">
                    <i class="fas fa-check-circle me-2"></i> Подтвердить
                </button>
            </form>
            <div style="text-align:center;margin-top:12px;">
                <button onclick="backToLogin()" class="neon-button" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.1);font-size:13px;">
                    <i class="fas fa-arrow-left me-1"></i> Назад
                </button>
            </div>
        </div>
        
        <div id="error" class="error"></div>
        <div id="codeSentInfo" class="subtitle" style="display:none;margin-top:8px;color:rgba(0,255,150,0.6);font-size:11px;">
            <i class="fas fa-check-circle"></i> Код отправлен в Telegram
        </div>
    </div>

    <script>
        var _verifyToken = '';
        
        function generateStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 250; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2.5 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', Math.random() * 4 + 1 + 's');
                star.style.opacity = Math.random() * 0.6 + 0.2;
                starsContainer.appendChild(star);
            }
        }
        generateStars();
        
        function showToast(msg, type) {
            const div = document.createElement('div');
            div.className = 'toast-custom';
            div.style.background = type === 'error' ? 'rgba(255,50,50,0.85)' : 'rgba(255,0,102,0.85)';
            div.innerHTML = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3500);
        }
        
        async function login(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            document.getElementById('error').style.display = 'none';
            
            try {
                const response = await fetch('/api/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
    
                if (data.success && data.need_verify) {
                    _verifyToken = data.verify_token;
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                    document.getElementById('codeSentInfo').style.display = 'block';
                    document.getElementById('codeInput').focus();
                    showToast('<i class="fas fa-paper-plane me-1"></i> Код отправлен в Telegram');
                } else if (data.success) {
                    localStorage.setItem('admin_token', data.token);
                    localStorage.setItem('admin_username', data.username);
                    showToast('<i class="fas fa-rocket"></i> Добро пожаловать в космос!');
                    setTimeout(() => window.location.href = '/dashboard/', 500);
                } else {
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error').innerText = data.error || 'Неверный логин или пароль';
                }
            } catch (err) {
                showToast('<i class="fas fa-exclamation-circle"></i> Ошибка соединения', 'error');
            }
        }
        
        async function verifyCode(e) {
            e.preventDefault();
            const code = document.getElementById('codeInput').value.trim();
            document.getElementById('error').style.display = 'none';
            
            try {
                const response = await fetch('/api/verify-login-code/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: _verifyToken, code: code })
                });
                const data = await response.json();
    
                if (data.success) {
                    localStorage.setItem('admin_token', data.token);
                    localStorage.setItem('admin_username', data.username);
                    showToast('<i class="fas fa-rocket"></i> Добро пожаловать в космос!');
                    setTimeout(() => window.location.href = '/dashboard/', 500);
                } else {
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error').innerText = data.error || 'Неверный код';
                    document.getElementById('codeInput').value = '';
                    document.getElementById('codeInput').focus();
                }
            } catch (err) {
                showToast('<i class="fas fa-exclamation-circle"></i> Ошибка соединения', 'error');
            }
        }
        
        function backToLogin() {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
            document.getElementById('codeSentInfo').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById('codeInput').value = '';
            _verifyToken = '';
        }
    </script>
</body>
</html>
