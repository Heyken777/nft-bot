{% extends 'usersite/base.html' %}
{% block title %}Новый пароль{% endblock %}
{% block content %}
<div style="max-width:460px;margin:40px auto;">
    <div class="card">
        {% if error %}
        <h2><i class="fi fi-rr-exclamation"></i> Ошибка</h2>
        <p style="color:var(--danger);font-size:14px;">{{ error }}</p>
        <div class="mt-3 text-center">
            <a href="/usersite/password-reset/" class="btn btn-primary">Запросить сброс снова</a>
        </div>
        {% else %}
        <h2><i class="fi fi-rr-lock"></i> Новый пароль</h2>
        <p class="text-muted" style="font-size:13px;">Для {{ email }} придумайте новый пароль.</p>
        <div class="form-group mt-3">
            <label class="form-label">Новый пароль</label>
            <input type="password" id="passField" class="form-control" placeholder="Минимум 6 символов">
        </div>
        <div class="form-group mt-2">
            <label class="form-label">Подтвердите пароль</label>
            <input type="password" id="pass2Field" class="form-control" placeholder="Повторите пароль">
        </div>
        <div id="errorMsg" style="color:var(--danger);font-size:13px;margin-top:8px;display:none;"></div>
        <div id="successMsg" style="color:var(--success);font-size:13px;margin-top:8px;display:none;"></div>
        <button class="btn btn-primary mt-3" id="resetBtn" onclick="resetPass()" style="width:100%;">
            <i class="fi fi-rr-check"></i> Сохранить пароль
        </button>
        <div class="mt-3 text-center">
            <a href="/usersite/login/" style="font-size:13px;color:var(--accent);">← Назад к входу</a>
        </div>
        {% endif %}
    </div>
</div>
{% if not error %}
<script>
async function resetPass() {
    var p1 = document.getElementById('passField').value;
    var p2 = document.getElementById('pass2Field').value;
    var err = document.getElementById('errorMsg');
    var ok = document.getElementById('successMsg');
    var btn = document.getElementById('resetBtn');
    err.style.display = 'none'; ok.style.display = 'none';
    if (p1.length < 6) { err.textContent = 'Пароль минимум 6 символов'; err.style.display = 'block'; return; }
    if (p1 !== p2) { err.textContent = 'Пароли не совпадают'; err.style.display = 'block'; return; }
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Сохранение...';
    try {
        var r = await fetch('/usersite/api/password-reset-confirm/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
            body: JSON.stringify({token: '{{ token }}', password: p1})
        });
        var d = await r.json();
        if (d.success) {
            ok.textContent = '✓ Пароль успешно изменён! Перенаправление...';
            ok.style.display = 'block';
            setTimeout(function() { window.location.href = '/usersite/login/'; }, 1500);
        } else {
            err.textContent = d.error || 'Ошибка';
            err.style.display = 'block';
        }
    } catch(e) {
        err.textContent = 'Ошибка соединения';
        err.style.display = 'block';
    }
    btn.disabled = false; btn.innerHTML = '<i class="fi fi-rr-check"></i> Сохранить пароль';
}
</script>
{% endif %}
{% endblock %}
