<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeykenVPN — Quiet Luxury</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Playfair+Display:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/luxury.css">
    
    <style>
        /* Telegram Login Widget стилизация */
        .telegram-login-widget {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: transparent;
            border: 1px solid rgba(215, 210, 200, 0.3);
            padding: 14px 32px;
            border-radius: 0;
            color: var(--text-primary);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-decoration: none;
        }
        
        .telegram-login-widget:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #0a0a0a;
        }
        
        /* Toasts */
        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 1100;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <a href="/usersite/" class="logo">HEYKEN</a>
            
            <div class="burger">
                <div class="burger__line"></div>
                <div class="burger__line"></div>
                <div class="burger__line"></div>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-menu__item"><a href="/usersite/dashboard/" class="nav-menu__link">Главная</a></li>
                <li class="nav-menu__item"><a href="/usersite/profile/" class="nav-menu__link">Профиль</a></li>
                <li class="nav-menu__item"><a href="/usersite/tickets/" class="nav-menu__link">Поддержка</a></li>
                <li class="nav-menu__item"><a href="/usersite/logout/" class="nav-menu__link">Выйти</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <button class="theme-toggle" aria-label="Сменить тему">
        <span>🌙</span>
    </button>
    
    <script src="https://telegram.org/js/telegram-widget.js?22" async></script>
    <script src="/static/js/luxury.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
