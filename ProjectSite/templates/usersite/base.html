<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heyken — {% block title %}Панель управления{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/js/all.min.js"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <style>
        /* ---------- ПЕРЕМЕННЫЕ FUNPAY СТИЛЬ ---------- */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-tertiary: #f1f3f5;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #6c757d;
            --text-muted: #adb5bd;
            --border: #e9ecef;
            --border-light: #dee2e6;
            --accent: #0d6efd;
            --accent-hover: #0b5ed7;
            --accent-dim: rgba(13, 110, 253, 0.08);
            --danger: #dc3545;
            --success: #198754;
            --warning: #ffc107;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --radius: 12px;
            --radius-sm: 8px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            line-height: 1.5;
        }
        
        /* ---------- TYPOGRAPHY ---------- */
        h1 { font-size: 26px; font-weight: 600; margin-bottom: 4px; }
        h2 { font-size: 20px; font-weight: 600; margin-bottom: 16px; }
        h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
        .text-muted { color: var(--text-muted); }
        .text-accent { color: var(--accent); }
        
        /* ---------- LAYOUT ---------- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        @media (max-width: 768px) {
            .container { padding: 0 16px; }
        }
        
        /* ---------- HEADER FUNPAY СТИЛЬ ---------- */
        .header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 700;
            text-decoration: none;
            color: var(--text-primary);
        }
        
        .logo img {
            height: 32px;
        }
        
        .logo:hover {
            color: var(--accent);
        }
        
        .nav-menu {
            display: flex;
            gap: 32px;
            list-style: none;
            align-items: center;
        }
        
        .nav-menu__link {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            padding: 8px 0;
            position: relative;
            transition: color 0.2s;
        }
        
        .nav-menu__link:hover {
            color: var(--accent);
        }
        
        /* Анимированная черточка при наведении */
        .nav-menu__link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s ease;
        }
        
        .nav-menu__link:hover::after,
        .nav-menu__link.active::after {
            width: 100%;
        }
        
        .nav-menu__link.active {
            color: var(--accent);
        }
        
        /* Burger Menu */
        .burger {
            display: none;
            cursor: pointer;
        }
        
        .burger span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--text-primary);
            margin: 5px 0;
            transition: 0.3s;
        }
        
        @media (max-width: 768px) {
            .nav-menu {
                position: fixed;
                top: 56px;
                left: -100%;
                width: 100%;
                height: calc(100vh - 56px);
                background: var(--bg-primary);
                flex-direction: column;
                padding: 24px;
                transition: 0.3s;
                border-top: 1px solid var(--border);
            }
            .nav-menu.active {
                left: 0;
            }
            .burger {
                display: block;
            }
        }
        
        /* ---------- MAIN ---------- */
        .main {
            min-height: calc(100vh - 120px);
            padding: 32px 0;
        }
        
        /* ---------- CARDS (FUNPAY СТИЛЬ) ---------- */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
        }
        
        /* ---------- BREADCRUMBS ---------- */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 13px;
        }
        
        .breadcrumb a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .breadcrumb a:hover {
            color: var(--accent);
        }
        
        .breadcrumb .separator {
            color: var(--text-muted);
        }
        
        .breadcrumb .current {
            color: var(--text-primary);
            font-weight: 500;
        }
        
        /* ---------- WARNING BANNER ---------- */
        .warning-banner {
            background: #fff3cd;
            border-left: 3px solid var(--warning);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #856404;
        }
        
        /* ---------- FORMS ---------- */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        .form-label.required::after {
            content: '*';
            color: var(--danger);
            margin-left: 4px;
        }
        
        .form-control,
        select,
        textarea {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: 14px;
            transition: 0.2s;
        }
        
        .form-control:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.1);
        }
        
        .radio-group {
            display: flex;
            gap: 24px;
            margin-top: 8px;
        }
        
        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        /* ---------- BUTTONS ---------- */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            color: var(--text-primary);
        }
        
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        
        .btn-outline {
            border-color: var(--border);
        }
        
        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        /* ---------- TICKET LIST ---------- */
        .ticket-filters {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .search-box {
            position: relative;
        }
        
        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .search-box input {
            padding-left: 36px;
            width: 260px;
        }
        
        .filter-select {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .ticket-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .ticket-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .ticket-item:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-md);
        }
        
        .ticket-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .ticket-status--open {
            background: rgba(13, 110, 253, 0.1);
            color: var(--accent);
        }
        
        .ticket-status--in_progress {
            background: rgba(255, 193, 7, 0.1);
            color: #d39e00;
        }
        
        .ticket-status--closed {
            background: rgba(108, 117, 125, 0.1);
            color: #6c757d;
        }
        
        /* ---------- STAT CARDS (ДАШБОРД) ---------- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
        }
        
        .stat-card__value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
        }
        
        .stat-card__label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .grid-2 { grid-template-columns: 1fr; }
        }
        
        /* ---------- PROFILE ---------- */
        .profile-sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 600;
            color: white;
            margin: 0 auto 16px;
        }
        
        /* ---------- TICKET META ---------- */
        .ticket-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .ticket-meta-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        
        /* ---------- CHAT ---------- */
        .chat-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        
        .chat-messages {
            max-height: 450px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: var(--radius);
        }
        
        .message--user {
            align-self: flex-end;
            background: var(--accent);
            color: white;
        }
        
        .message--support {
            align-self: flex-start;
            background: var(--bg-secondary);
            border-left: 2px solid var(--accent);
        }
        
        .message__time {
            font-size: 10px;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        
        .chat-input-area {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }
        
        /* ---------- FOOTER ---------- */
        .footer {
            border-top: 1px solid var(--border);
            padding: 24px 0;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        /* ---------- TOAST ---------- */
        .toast-custom {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 20px;
            z-index: 1100;
            animation: slideIn 0.3s ease;
            box-shadow: var(--shadow-md);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        
        
        /* ---------- UTILITIES ---------- */
        .mt-2 { margin-top: 8px; }
        .mt-3 { margin-top: 16px; }
        .mt-4 { margin-top: 24px; }
        .mb-2 { margin-bottom: 8px; }
        .mb-3 { margin-bottom: 16px; }
        .mb-4 { margin-bottom: 24px; }
        .text-center { text-align: center; }
        .flex { display: flex; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .gap-2 { gap: 12px; }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="nav">
                <a href="/usersite/dashboard/" class="logo">
                    <i class="fas fa-shield-haltered"></i> Heyken Industry
                </a>
                <div class="burger" onclick="toggleMobileMenu()">
                    <span></span><span></span><span></span>
                </div>
                <ul class="nav-menu">
                    <li><a href="/usersite/dashboard/" class="nav-menu__link" data-page="dashboard">Главная</a></li>
                    <li><a href="/usersite/profile/" class="nav-menu__link" data-page="profile">Профиль</a></li>
                    <li><a href="/usersite/premium/" class="nav-menu__link" data-page="premium">🏅 Премиум</a></li>
                    <li><a href="/usersite/transactions/" class="nav-menu__link" data-page="transactions">Операции</a></li>
                    <li><a href="/usersite/reviews/" class="nav-menu__link" data-page="reviews">⭐ Отзывы</a></li>
                    <li><a href="/usersite/withdraw/" class="nav-menu__link" data-page="withdraw">Вывод</a></li>
                    <li><a href="/usersite/partnership/my/" class="nav-menu__link">Сотрудничество</a></li>
                    <li><a href="/usersite/tickets/" class="nav-menu__link" data-page="tickets">Поддержка</a></li>
                    <li><a href="/usersite/logout/" class="nav-menu__link">Выйти</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 Heyken — Private & Secure VPN</p>
        </div>
    </footer>

    <script>
        // Подсветка активного пункта меню
        const currentPage = window.location.pathname.split('/')[2] || 'dashboard';
        document.querySelectorAll('.nav-menu__link').forEach(link => {
            const page = link.dataset.page;
            if (page === currentPage || (currentPage === '' && page === 'dashboard')) {
                link.classList.add('active');
            }
        });
        
        function toggleMobileMenu() {
            document.querySelector('.nav-menu').classList.toggle('active');
        }
        
        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast-custom';
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Закрытие мобильного меню при клике на ссылку
        document.querySelectorAll('.nav-menu__link').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelector('.nav-menu').classList.remove('active');
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
