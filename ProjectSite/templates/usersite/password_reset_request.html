{% extends 'usersite/base.html' %}
{% block title %}Восстановление пароля{% endblock %}
{% block content %}
<div style="max-width:460px;margin:40px auto;">
    <div class="card">
        <h2><i class="fi fi-rr-envelope"></i> Восстановление пароля</h2>
        <p class="text-muted" style="font-size:13px;">Введите email, который вы указали при регистрации. Мы отправим ссылку для сброса пароля.</p>
        <div class="form-group mt-3">
            <label class="form-label">Email</label>
            <input type="email" id="emailField" class="form-control" placeholder="your@email.com">
        </div>
        <div id="errorMsg" style="color:var(--danger);font-size:13px;margin-top:8px;display:none;"></div>
        <div id="successMsg" style="color:var(--success);font-size:13px;margin-top:8px;display:none;"></div>
        <button class="btn btn-primary mt-3" id="sendBtn" onclick="sendReset()" style="width:100%;">
            <i class="fi fi-rr-paper-plane"></i> Отправить
        </button>
        <div class="mt-3 text-center">
            <a href="/usersite/login/" style="font-size:13px;color:var(--accent);">← Назад к входу</a>
        </div>
    </div>
</div>
<script>
async function sendReset() {
    var email = document.getElementById('emailField').value.trim();
    var err = document.getElementById('errorMsg');
    var ok = document.getElementById('successMsg');
    var btn = document.getElementById('sendBtn');
    err.style.display = 'none';
    ok.style.display = 'none';
    if (!email || !/^[^@]+@[^@]+\.[^@]+$/.test(email)) {
        err.textContent = 'Введите корректный email';
        err.style.display = 'block';
        return;
    }
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Отправка...';
    try {
        var r = await fetch('/usersite/api/password-reset-request/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
            body: JSON.stringify({email: email})
        });
        var d = await r.json();
        if (d.success) {
            ok.textContent = '✓ Письмо отправлено! Проверьте ваш email.';
            ok.style.display = 'block';
        } else {
            err.textContent = d.error || 'Ошибка';
            err.style.display = 'block';
        }
    } catch(e) {
        err.textContent = 'Ошибка соединения';
        err.style.display = 'block';
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="fi fi-rr-paper-plane"></i> Отправить';
}
</script>
{% endblock %}
