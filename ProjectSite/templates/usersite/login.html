{% extends 'usersite/base.html' %}
{% load static %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="hero" style="min-height:70vh;">
    <div class="hero__content" style="max-width:450px;margin:0 auto;">
        <div class="card text-center">
            <div class="profile-avatar" style="width:80px;height:80px;margin:0 auto 24px;">
                <i class="fas fa-shield-haltered"></i>
            </div>
            <h1>Вход в личный кабинет</h1>
            <p class="text-muted mb-4">Введите Telegram ID, нажмите «Получить код» и проверьте бота</p>
            <div class="mt-3">
                <label class="form-label">Telegram ID</label>
                <input type="text" id="telegramId" class="form-control mb-2" placeholder="Ваш Telegram ID" inputmode="numeric">
                <button class="btn btn-primary w-100" id="requestCodeBtn" onclick="requestCode()">
                    <i class="fab fa-telegram me-2"></i> Получить код
                </button>
                <div id="codeResult" class="mt-3" style="display:none;">
                    <div class="p-3" style="background:#e8f5e9;border-radius:8px;color:#2e7d32;">
                        <i class="fas fa-check-circle"></i> Код отправлен! Откройте бота и введите команду <strong>/code</strong>
                    </div>
                </div>
            </div>
            <div class="mt-4 pt-3 border-top">
                <label class="form-label">Или введите полученный код</label>
                <div class="flex gap-2">
                    <input type="text" id="authCode" class="form-control" placeholder="6-значный код" maxlength="6" inputmode="numeric">
                    <button class="btn btn-primary" onclick="loginWithCode()">Войти</button>
                </div>
            </div>
            <div class="mt-3">
                <a href="https://t.me/{{ bot_username }}" target="_blank" class="text-muted small">
                    <i class="fab fa-telegram"></i> @{{ bot_username }}
                </a>
                <span class="text-muted mx-2">|</span>
                <a href="/usersite/test-login/" class="text-muted small">Тестовый вход</a>
            </div>
        </div>
    </div>
</div>

<script>
async function requestCode() {
    const userId = document.getElementById('telegramId').value.trim();
    if (!userId || !/^\d+$/.test(userId)) {
        showToast('Введите корректный Telegram ID', 'error'); return;
    }
    const btn = document.getElementById('requestCodeBtn');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Отправка...';
    try {
        const res = await fetch('/usersite/api/request-code/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': document.cookie.match(/csrftoken=([^;]+)/)?.[1] || ''},
            body: JSON.stringify({telegram_id: parseInt(userId)})
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('codeResult').style.display = 'block';
            showToast('Код отправлен в Telegram!');
        } else {
            showToast('Ошибка: ' + (data.error || 'Неизвестная ошибка'), 'error');
        }
    } catch(e) {
        showToast('Ошибка соединения', 'error');
    } finally {
        btn.disabled = false; btn.innerHTML = '<i class="fab fa-telegram me-2"></i> Получить код';
    }
}

function loginWithCode() {
    const code = document.getElementById('authCode').value.trim();
    if (code.length === 6 && /^\d+$/.test(code)) {
        window.location.href = '/usersite/telegram-auth/?code=' + code;
    } else {
        showToast('Введите 6-значный код', 'error');
    }
}
</script>
{% endblock %}
