<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Купить Premium - Novix Gift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: #0a0a12; }
        .plan-card { transition: all 0.2s ease; cursor: pointer; }
        .plan-card.selected { border-color: #7B3FF2; background: rgba(123,63,242,0.1); transform: scale(1.02); }
        .currency-option { transition: all 0.2s ease; cursor: pointer; }
        .currency-option.selected { background: #7B3FF2; color: white; border-color: #7B3FF2; }
    </style>
</head>
<body class="bg-[#0a0a12] text-white">
    <div class="max-w-md mx-auto min-h-screen flex flex-col">
        
        <!-- Шапка -->
        <div class="glass px-5 pt-6 pb-3 border-b border-white/10 sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <button onclick="window.history.back()" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-[#00f2fe]">←</button>
                <h1 class="text-xl font-semibold">⭐ Купить Premium</h1>
            </div>
        </div>
        
        <div class="flex-1 px-5 py-5 space-y-5 overflow-y-auto pb-24">
            
            <!-- Текущий статус -->
            <div class="glass rounded-2xl p-5 text-center">
                <div class="text-3xl mb-2">⭐</div>
                <div class="font-semibold text-lg" id="premiumStatusText">Premium не активен</div>
                <div class="text-xs text-gray-500 mt-1" id="premiumExpiresText"></div>
            </div>
            
            <!-- Преимущества -->
            <div class="glass rounded-xl p-4">
                <div class="font-medium mb-2">✨ Преимущества Premium</div>
                <div class="space-y-2 text-sm">
                    <div class="flex items-center gap-2">• Комиссия при сделках: <span class="text-green-400 font-semibold">0%</span></div>
                    <div class="flex items-center gap-2">• Комиссия при выводе: <span class="text-green-400 font-semibold">0%</span></div>
                    <div class="flex items-center gap-2">• Приоритетная поддержка 24/7</div>
                    <div class="flex items-center gap-2">• Выделенный значок в профиле</div>
                </div>
            </div>
            
            <!-- Выбор валюты -->
            <div>
                <div class="text-sm font-medium mb-2">💰 Валюта оплаты</div>
                <div class="flex flex-wrap gap-2" id="currencySelect"></div>
            </div>
            
            <!-- Выбор плана -->
            <div>
                <div class="text-sm font-medium mb-2">📅 Выберите план</div>
                <div class="space-y-2" id="plansList"></div>
            </div>
            
            <!-- Кнопка покупки -->
            <button class="w-full bg-gradient-to-r from-amber-500 to-amber-600 py-3 rounded-xl font-semibold shadow-lg transition hover:opacity-90" id="buyPremiumBtn">
                💎 Купить Premium
            </button>
            
            <div class="text-center text-xs text-gray-500 py-2">🔒 Безопасная оплата через бота</div>
        </div>
        
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        
        function navigateTo(page) {
            const pages = { home: 'index.html', deals: 'deals.html', profile: 'profile.html', premium: 'premium.html' };
            window.location.href = pages[page] || 'index.html';
        }
        
        const rates = { RUB: 1, USD: 92.5, EUR: 100, TON: 500, USDT: 92, STARS: 15 };
        const prices = {30: 299, 45: 419, 60: 559, 90: 799, 365: 2999};
        
        let selectedCurrency = 'RUB';
        let selectedDays = 30;
        
        function getCurrencySymbol(c) {
            const s = { RUB: '🇷🇺', USD: '🇺🇸', EUR: '🇪🇺', TON: '💎', USDT: '💵', STARS: '⭐️' };
            return s[c] || c;
        }
        
        function updatePrices() {
            const rate = rates[selectedCurrency] || 1;
            const plansDiv = document.getElementById('plansList');
            plansDiv.innerHTML = Object.entries(prices).map(([days, rubPrice]) => {
                const price = Math.floor(rubPrice / rate);
                return `<div class="plan-card glass rounded-xl p-3 border border-white/10 ${days == selectedDays ? 'selected' : ''}" data-days="${days}">
                    <div class="flex justify-between items-center">
                        <span class="font-medium">${days === 365 ? '👑 FOREVER' : days + ' дней'}</span>
                        <span class="text-amber-400 font-bold">${price.toLocaleString()} ${selectedCurrency}</span>
                    </div>
                    ${days === 365 ? '<div class="text-xs text-emerald-400 mt-1">⚡ Лучшая цена!</div>' : ''}
                </div>`;
            }).join('');
            
            document.querySelectorAll('.plan-card').forEach(el => {
                el.onclick = () => {
                    document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
                    el.classList.add('selected');
                    selectedDays = parseInt(el.dataset.days);
                };
            });
        }
        
        // Выбор валюты
        const currencySelect = document.getElementById('currencySelect');
        currencySelect.innerHTML = Object.keys(rates).map(c => `<button class="currency-option px-4 py-1.5 rounded-full text-sm bg-white/5 border border-white/10 ${c === selectedCurrency ? 'selected' : ''}" data-currency="${c}">${getCurrencySymbol(c)} ${c}</button>`).join('');
        
        document.querySelectorAll('.currency-option').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.currency-option').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedCurrency = btn.dataset.currency;
                updatePrices();
            };
        });
        
        updatePrices();
        
        // Кнопка покупки
        document.getElementById('buyPremiumBtn').onclick = async () => {
            const rate = rates[selectedCurrency] || 1;
            const price = Math.floor(prices[selectedDays] / rate);
            // Проверяем баланс пользователя
            try {
                const resp = await fetch(`/api/user?user_id=${tg.initDataUnsafe?.user?.id || 0}`);
                if (resp.ok) {
                    const data = await resp.json();
                    const balance = (data.balances && data.balances[selectedCurrency]) || 0;
                    if (balance < price) {
                        tg.showPopup({title: 'Ошибка', message: `Недостаточно средств. Нужно ${price} ${selectedCurrency}, у вас ${balance} ${selectedCurrency}`});
                        return;
                    }
                }
            } catch (e) {}
            tg.openTelegramLink(`https://t.me/NovixGift_Bot?start=buy_premium_${selectedDays}_${selectedCurrency}`);
        };
        
        // Проверка статуса Premium
        fetch('/api/user?user_id=' + (tg.initDataUnsafe?.user?.id || 0))
            .then(res => res.json())
            .then(data => {
                if (data.is_premium) {
                    document.getElementById('premiumStatusText').innerHTML = '⭐ Premium активен';
                    if (data.premium_until) {
                        document.getElementById('premiumExpiresText').innerHTML = `до ${new Date(data.premium_until).toLocaleDateString('ru-RU')}`;
                    } else {
                        document.getElementById('premiumExpiresText').innerHTML = 'бессрочно';
                    }
                    document.getElementById('buyPremiumBtn').innerHTML = '✅ Premium уже активен';
                    document.getElementById('buyPremiumBtn').disabled = true;
                }
            })
            .catch(() => console.log('API не доступен'));
    </script>
    <script src="animations.js"></script>
</body>
</html>
