<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Рефералы - Novix Gift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: #0a0a12; }
        .glass {
            background: rgba(10, 10, 18, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="bg-[#0a0a12] text-white">
    <div class="max-w-md mx-auto min-h-screen flex flex-col">
        
        <!-- Шапка -->
        <div class="glass px-5 pt-6 pb-3 border-b border-white/10">
            <div class="flex items-center gap-3">
                <button onclick="window.history.back()" class="text-[#00f2fe] text-xl">←</button>
                <h1 class="text-xl font-bold neon-text">👥 Рефералы</h1>
            </div>
        </div>
        
        <div class="flex-1 px-5 py-5 space-y-5 overflow-y-auto">
            
            <!-- Статистика -->
            <div class="grid grid-cols-2 gap-3">
                <div class="glass rounded-xl p-4 text-center border border-white/10">
                    <div class="text-2xl font-bold text-[#00f2fe]" id="referralCount">0</div>
                    <div class="text-xs text-gray-400">Приглашено друзей</div>
                </div>
                <div class="glass rounded-xl p-4 text-center border border-white/10">
                    <div class="text-2xl font-bold text-emerald-400" id="referralEarnings">0 RUB</div>
                    <div class="text-xs text-gray-400">Заработано</div>
                </div>
            </div>
            
            <!-- Реферальная ссылка -->
            <div class="glass rounded-2xl p-5 border border-white/10 text-center">
                <div class="font-semibold mb-2">🔗 Твоя реферальная ссылка</div>
                <div class="text-xs break-all bg-black/30 p-3 rounded-xl font-mono" id="referralLink">Загрузка...</div>
                <button class="mt-3 bg-[#00f2fe]/20 border border-[#00f2fe]/50 rounded-xl px-4 py-2 text-sm" id="copyLinkBtn">
                    📋 Копировать ссылку
                </button>
            </div>
            
            <!-- Как это работает -->
            <div class="glass rounded-2xl p-5 border border-white/10">
                <div class="font-semibold mb-3">📖 Как это работает?</div>
                <div class="space-y-3">
                    <div class="flex items-center gap-3"><div class="w-6 h-6 rounded-full bg-[#00f2fe]/20 flex items-center justify-center text-xs">1</div><span>Отправь ссылку другу</span></div>
                    <div class="flex items-center gap-3"><div class="w-6 h-6 rounded-full bg-[#00f2fe]/20 flex items-center justify-center text-xs">2</div><span>Друг регистрируется в боте</span></div>
                    <div class="flex items-center gap-3"><div class="w-6 h-6 rounded-full bg-emerald-400/20 flex items-center justify-center text-xs">3</div><span>Вы получаете <strong class="text-emerald-400">+50 RUB</strong> на баланс</span></div>
                    <div class="flex items-center gap-3"><div class="w-6 h-6 rounded-full bg-emerald-400/20 flex items-center justify-center text-xs">4</div><span>Друг получает <strong class="text-emerald-400">+50 RUB</strong> бонусом</span></div>
                </div>
            </div>
            
            <!-- Список приглашённых -->
            <div class="glass rounded-2xl p-5 border border-white/10">
                <div class="font-semibold mb-3">👥 Приглашённые друзья</div>
                <div id="referralsList" class="space-y-2">
                    <div class="text-center text-gray-500 py-4">Пока нет приглашённых</div>
                </div>
            </div>
            
        </div>
        
        <!-- Нижняя навигация -->
        <div class="glass border-t border-white/10 py-2 px-4">
            <div class="flex justify-around items-center">
                <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="navigateTo('home')">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
                    </svg>
                    <span class="text-[9px] text-gray-400">Главная</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="navigateTo('deals')">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m8.25-6h-2.5" />
                    </svg>
                    <span class="text-[9px] text-gray-400">Сделки</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="navigateTo('profile')">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                    </svg>
                    <span class="text-[9px] text-gray-400">Профиль</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="navigateTo('premium')">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.562.562 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.562.562 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" />
                    </svg>
                    <span class="text-[9px] text-gray-400">Premium</span>
                </div>
            </div>
        </div>
        
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const user = tg.initDataUnsafe?.user || {};
        const userId = user.id;
        
        function navigateTo(page) {
            tg.close();
            tg.openTelegramLink(`https://t.me/NovixGift_Bot?startapp=${page}`);
        }
        
        // Реферальная ссылка
        const refLink = `https://t.me/NovixGift_Bot?start=ref_${userId}`;
        document.getElementById('referralLink').innerText = refLink;
        
        document.getElementById('copyLinkBtn').onclick = () => {
            navigator.clipboard.writeText(refLink);
            tg.showPopup({title: 'Скопировано', message: 'Реферальная ссылка скопирована!'});
        };
        
        // Пример данных (заменить на реальные из бота)
        document.getElementById('referralCount').innerText = '5';
        document.getElementById('referralEarnings').innerText = '250 RUB';
    </script>
</body>
</html>
