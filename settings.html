<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Настройки - Novix Gift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: #0a0a12; color: var(--tg-theme-text-color, #fff); }
        .glass { background: rgba(10,10,18,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); }
        .glass-light { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); }
        .input-field {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 15px;
            color: var(--tg-theme-text-color, #fff);
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            border-color: var(--tg-theme-button-color, #7B3FF2);
        }
        .input-field::placeholder {
            color: rgba(255,255,255,0.25);
        }
        .save-btn {
            background: var(--tg-theme-button-color, #7B3FF2);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-weight: 600;
            font-size: 15px;
            width: 100%;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .save-btn:active { opacity: 0.8; }
        .save-btn:disabled { opacity: 0.4; cursor: default; }
        .toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: #1f2937; color: white; padding: 10px 20px; border-radius: 40px;
            font-size: 14px; z-index: 1000; animation: toastFade 2s ease forwards;
        }
        @keyframes toastFade { 0%{opacity:0;transform:translateX(-50%) translateY(10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 85%{opacity:1} 100%{opacity:0;visibility:hidden} }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto min-h-screen flex flex-col">

        <div class="glass px-5 pt-6 pb-3 border-b border-white/10">
            <div class="flex items-center gap-3">
                <button onclick="window.history.back()" class="text-[#00f2fe] text-xl">←</button>
                <h1 class="text-xl font-bold" style="text-shadow:0 0 10px #00f2fe,0 0 20px #00f2fe66">⚙️ Настройки</h1>
            </div>
        </div>

        <div class="flex-1 px-5 py-5 space-y-5 overflow-y-auto pb-24">

            <!-- Банковская карта -->
            <div class="glass rounded-2xl p-5 border border-white/10">
                <div class="flex items-center gap-3 mb-4">
                    <span class="text-2xl">💳</span>
                    <div>
                        <div class="font-semibold">Банковская карта</div>
                        <div class="text-xs" style="color:var(--tg-theme-hint-color,#9ca3af)">Для вывода средств</div>
                    </div>
                </div>
                <input type="text" id="cardInput" class="input-field mb-3" placeholder="Номер карты (16 цифр)" maxlength="19" inputmode="numeric">
                <div class="text-xs" style="color:var(--tg-theme-hint-color,#9ca3af)" id="cardStatus">Загрузка...</div>
                <button class="save-btn mt-3" id="saveCardBtn">💾 Сохранить карту</button>
            </div>

            <!-- TON кошелёк -->
            <div class="glass rounded-2xl p-5 border border-white/10">
                <div class="flex items-center gap-3 mb-4">
                    <span class="text-2xl">💎</span>
                    <div>
                        <div class="font-semibold">TON кошелёк</div>
                        <div class="text-xs" style="color:var(--tg-theme-hint-color,#9ca3af)">Для криптовалютных сделок</div>
                    </div>
                </div>
                <input type="text" id="tonInput" class="input-field mb-3" placeholder="Адрес TON (начинается с UQ или EQ)" maxlength="48">
                <div class="text-xs" style="color:var(--tg-theme-hint-color,#9ca3af)" id="tonStatus">Загрузка...</div>
                <button class="save-btn mt-3" id="saveTonBtn">💾 Сохранить TON кошелёк</button>
            </div>

            <div class="text-center text-xs" style="color:var(--tg-theme-hint-color,#9ca3af)">
                Все данные хранятся в зашифрованном виде и используются только для выводов
            </div>

        </div>

        <!-- Нижняя навигация -->
        <div class="glass border-t border-white/10 py-2 px-4 fixed bottom-0 max-w-md w-full z-20">
            <div class="flex justify-around items-center">
                <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="window.location.href='index.html'">
                    <svg class="w-5 h-5 text-gray-400 nav-icon" id="nav-home-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
                    <span class="text-[9px] text-gray-400 nav-text" id="nav-home-text">Главная</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="window.location.href='deals.html'">
                    <svg class="w-5 h-5 text-gray-400 nav-icon" id="nav-deals-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25"/></svg>
                    <span class="text-[9px] text-gray-400 nav-text" id="nav-deals-text">Сделки</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="window.location.href='referral.html'">
                    <svg class="w-5 h-5 text-gray-400 nav-icon" id="nav-referral-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    <span class="text-[9px] text-gray-400 nav-text" id="nav-referral-text">Рефералы</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="window.location.href='profile.html'">
                    <svg class="w-5 h-5 text-gray-400 nav-icon" id="nav-profile-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
                    <span class="text-[9px] text-gray-400 nav-text" id="nav-profile-text">Профиль</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="window.location.href='premium.html'">
                    <svg class="w-5 h-5 text-gray-400 nav-icon" id="nav-premium-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.562.562 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.562.562 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
                    <span class="text-[9px] text-gray-400 nav-text" id="nav-premium-text">Premium</span>
                </div>
            </div>
        </div>
        <script>
        (function() {
            const page = window.location.pathname.split('/').pop() || 'index.html';
            const map = { 'index.html':'home', 'deals.html':'deals', 'referral.html':'referral', 'profile.html':'profile', 'premium.html':'premium' };
            const active = map[page];
            if (active) {
                const icon = document.getElementById('nav-'+active+'-icon');
                const text = document.getElementById('nav-'+active+'-text');
                if (icon) { icon.classList.remove('text-gray-400'); icon.classList.add('text-[#00f2fe]'); }
                if (text) { text.classList.remove('text-gray-400'); text.classList.add('text-[#00f2fe]'); }
            }
        })();
        </script>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const authToken = tg.initData || '';
        const userId = tg.initDataUnsafe?.user?.id || 0;

        function getAuthHeaders(extra = {}) {
            return { ...extra, 'Authorization': `tma ${authToken}`, 'X-Telegram-Init-Data': authToken };
        }

        async function apiFetch(url, options = {}) {
            const headers = getAuthHeaders(options.headers || {});
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);
            try {
                const response = await fetch(url, { ...options, headers, signal: controller.signal });
                clearTimeout(timeoutId);
                if (response.status === 401 || response.status === 403) {
                    tg.showPopup({ title: 'Ошибка авторизации', message: 'Сессия устарела. Откройте приложение заново из Telegram.' });
                }
                return response;
            } catch (err) {
                clearTimeout(timeoutId);
                throw err;
            }
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        // Загрузка текущих данных
        async function loadSettings() {
            try {
                const resp = await apiFetch(`/api/user?user_id=${userId}`);
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.card) {
                        document.getElementById('cardInput').value = data.card;
                        document.getElementById('cardStatus').textContent = '✅ Карта сохранена';
                    } else {
                        document.getElementById('cardStatus').textContent = '💳 Карта не указана';
                    }
                    if (data.ton) {
                        document.getElementById('tonInput').value = data.ton;
                        document.getElementById('tonStatus').textContent = '✅ TON кошелёк сохранён';
                    } else {
                        document.getElementById('tonStatus').textContent = '💎 TON кошелёк не указан';
                    }
                }
            } catch (e) {
                document.getElementById('cardStatus').textContent = '❌ Ошибка загрузки';
                document.getElementById('tonStatus').textContent = '❌ Ошибка загрузки';
            }
        }

        // Сохранение карты
        document.getElementById('saveCardBtn').onclick = async () => {
            const card = document.getElementById('cardInput').value.replace(/\s/g, '');
            if (!/^\d{16,19}$/.test(card)) {
                showToast('❌ Введите 16-19 цифр номера карты');
                return;
            }
            const btn = document.getElementById('saveCardBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Сохранение...';
            try {
                const resp = await apiFetch('/api/save_card', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, card: card })
                });
                if (resp.ok) {
                    showToast('✅ Карта сохранена');
                    document.getElementById('cardStatus').textContent = '✅ Карта сохранена';
                } else {
                    const err = await resp.json();
                    showToast('❌ ' + (err.error || 'Ошибка сохранения'));
                }
            } catch (e) {
                showToast('❌ Ошибка соединения с сервером');
            }
            btn.disabled = false;
            btn.textContent = '💾 Сохранить карту';
        };

        // Сохранение TON кошелька
        document.getElementById('saveTonBtn').onclick = async () => {
            const ton = document.getElementById('tonInput').value.trim();
            if (!ton.startsWith('UQ') && !ton.startsWith('EQ')) {
                showToast('❌ Адрес TON должен начинаться с UQ или EQ');
                return;
            }
            const btn = document.getElementById('saveTonBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Сохранение...';
            try {
                const resp = await apiFetch('/api/save_ton', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, ton: ton })
                });
                if (resp.ok) {
                    showToast('✅ TON кошелёк сохранён');
                    document.getElementById('tonStatus').textContent = '✅ TON кошелёк сохранён';
                } else {
                    const err = await resp.json();
                    showToast('❌ ' + (err.error || 'Ошибка сохранения'));
                }
            } catch (e) {
                showToast('❌ Ошибка соединения с сервером');
            }
            btn.disabled = false;
            btn.textContent = '💾 Сохранить TON кошелёк';
        };

        loadSettings();
    </script>
    <script src="animations.js"></script>
</body>
</html>
