<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Мои сделки - Novix Gift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: #0a0a12; }
        .glass {
            background: rgba(10, 10, 18, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .status-awaiting { background: #f59e0b20; color: #f59e0b; border-color: #f59e0b; }
        .status-paid { background: #00f2fe20; color: #00f2fe; border-color: #00f2fe; }
        .status-completed { background: #10b98120; color: #10b981; border-color: #10b981; }
    </style>
</head>
<body class="bg-[#0a0a12] text-white">
    <div class="max-w-md mx-auto min-h-screen flex flex-col">
        
        <!-- Шапка -->
        <div class="glass px-5 pt-6 pb-3 border-b border-white/10">
            <div class="flex items-center gap-3">
                <button onclick="window.history.back()" class="text-[#00f2fe] text-xl">←</button>
                <h1 class="text-xl font-bold neon-text">📋 Мои сделки</h1>
            </div>
        </div>
        
        <div class="flex-1 px-5 py-5 overflow-y-auto">
            
            <!-- Фильтры -->
            <div class="flex gap-2 mb-5 overflow-x-auto pb-2">
                <button class="filter-btn active px-4 py-1.5 rounded-full text-xs bg-[#00f2fe]/20 text-[#00f2fe]" data-filter="all">Все</button>
                <button class="filter-btn px-4 py-1.5 rounded-full text-xs bg-white/5 text-gray-400" data-filter="awaiting">⏳ Ожидают</button>
                <button class="filter-btn px-4 py-1.5 rounded-full text-xs bg-white/5 text-gray-400" data-filter="paid">💰 Оплачены</button>
                <button class="filter-btn px-4 py-1.5 rounded-full text-xs bg-white/5 text-gray-400" data-filter="completed">✅ Завершены</button>
            </div>
            
            <!-- Список сделок -->
            <div id="dealsList" class="space-y-3">
                <div class="glass rounded-xl p-4 border border-white/10">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-xs text-gray-500">Сделка #123456</span>
                            <div class="font-semibold mt-1">Legendary Sword NFT</div>
                        </div>
                        <span class="status-awaiting text-xs px-2 py-0.5 rounded-full border">⏳ Ожидает</span>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <span>💰 2,499 RUB</span>
                        <span class="text-gray-500">Продавец</span>
                    </div>
                    <button class="w-full mt-3 bg-[#00f2fe] text-black py-1.5 rounded-lg text-sm font-semibold">
                        ✅ Оплатить
                    </button>
                </div>
                <div class="glass rounded-xl p-4 border border-white/10">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-xs text-gray-500">Сделка #123457</span>
                            <div class="font-semibold mt-1">Dragon Shield NFT</div>
                        </div>
                        <span class="status-completed text-xs px-2 py-0.5 rounded-full border">✅ Завершена</span>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <span>💰 1,200 RUB</span>
                        <span class="text-gray-500">Покупатель</span>
                    </div>
                </div>
            </div>
            
            <div class="text-center text-gray-500 text-sm py-8" id="emptyState" style="display: none;">
                📭 У вас пока нет сделок
            </div>
            
        </div>
        
        <!-- Нижняя навигация -->
        <div class="glass border-t border-white/10 py-2 px-4">
            <div class="flex justify-around items-center">
                <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="window.location.href='index.html'">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
                    <span class="text-[9px] text-gray-400">Главная</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer active">
                    <svg class="w-5 h-5 text-[#00f2fe]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25"/></svg>
                    <span class="text-[9px] text-[#00f2fe]">Сделки</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="window.location.href='referral.html'">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    <span class="text-[9px] text-gray-400">Рефералы</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="window.location.href='profile.html'">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
                    <span class="text-[9px] text-gray-400">Профиль</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="window.location.href='premium.html'">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.562.562 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.562.562 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
                    <span class="text-[9px] text-gray-400">Premium</span>
                </div>
            </div>
        </div>
        
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        function navigateTo(page) {
            const pages = { home: 'index.html', deals: 'deals.html', profile: 'profile.html', premium: 'premium.html', referral: 'referral.html' };
            window.location.href = pages[page] || 'index.html';
        }
        
        let dealsData = [];
        let currentFilter = 'all';
        
        async function loadDeals() {
            try {
                const userId = tg.initDataUnsafe?.user?.id || 0;
                const response = await fetch(`/api/user?user_id=${userId}`);
                if (response.ok) {
                    const data = await response.json();
                    dealsData = data.deals || [];
                    renderDeals();
                }
            } catch (error) {
                console.error('API error:', error);
            }
        }
        
        function getStatusText(s) {
            const m = { 'awaiting': '⏳ Ожидает оплаты', 'paid': '💰 Оплачена', 'item_sent': '📦 Товар передан', 'completed': '✅ Завершена', 'cancelled': '❌ Отменена' };
            return m[s] || s;
        }
        
        function formatNumber(n) { return (n || 0).toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
        
        function renderDeals() {
            const container = document.getElementById('dealsList');
            const emptyState = document.getElementById('emptyState');
            let filtered = dealsData;
            if (currentFilter !== 'all') filtered = filtered.filter(d => d.status === currentFilter);
            
            if (!filtered.length) {
                container.style.display = 'none';
                if (emptyState) emptyState.style.display = 'block';
                return;
            }
            container.style.display = 'block';
            if (emptyState) emptyState.style.display = 'none';
            
            container.innerHTML = filtered.map(d => `
                <div class="glass rounded-xl p-4 border border-white/10">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-xs text-gray-500">Сделка #${d.id}</span>
                            <div class="font-semibold mt-1">${d.item || 'Без названия'}</div>
                        </div>
                        <span class="status-${d.status} text-xs px-2 py-0.5 rounded-full border">${getStatusText(d.status)}</span>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <span>💰 ${formatNumber(d.amount)} ${d.currency || 'RUB'}</span>
                        <span class="text-gray-500">${d.role === 'seller' ? 'Продавец' : 'Покупатель'}</span>
                    </div>
                    ${d.status === 'awaiting' && d.role === 'buyer' ? `<button class="pay-deal-btn w-full mt-3 bg-[#00f2fe] text-black py-1.5 rounded-lg text-sm font-semibold" data-id="${d.id}">✅ Оплатить</button>` : ''}
                </div>
            `).join('');
            
            document.querySelectorAll('.pay-deal-btn').forEach(btn => {
                btn.onclick = () => {
                    tg.openTelegramLink(`https://t.me/NovixGift_Bot?start=deal_${btn.dataset.id}`);
                };
            });
        }
        
        // Фильтрация
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('active', 'bg-[#00f2fe]/20', 'text-[#00f2fe]');
                    b.classList.add('bg-white/5', 'text-gray-400');
                });
                btn.classList.add('active', 'bg-[#00f2fe]/20', 'text-[#00f2fe]');
                btn.classList.remove('bg-white/5', 'text-gray-400');
                currentFilter = btn.dataset.filter;
                renderDeals();
            };
        });
        
        loadDeals();
    </script>
    <script src="animations.js"></script>
</body>
</html>
