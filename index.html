<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Novix Gift</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Шапка -->
        <div class="header">
            <div class="greeting">
                <h1>Добро пожаловать!</h1>
                <p id="userName">Загрузка...</p>
            </div>
            <div class="user-avatar" id="userAvatar">
                <span>👤</span>
            </div>
        </div>

        <!-- Баланс -->
        <div class="balance-card">
            <div class="balance-title">💰 Общий баланс</div>
            <div class="balance-amount" id="totalBalance">0 RUB</div>
            <div class="balance-actions">
                <button class="btn-secondary" id="depositBtn">Пополнить</button>
                <button class="btn-secondary" id="withdrawBtn">Вывести</button>
            </div>
        </div>

        <!-- Балансы по валютам -->
        <div class="currencies-section">
            <div class="section-title">💱 Мои балансы</div>
            <div class="currencies-grid" id="currenciesGrid">
                <!-- Динамическая загрузка -->
            </div>
        </div>

        <!-- Меню действий -->
        <div class="actions-menu">
            <div class="section-title">🚀 Действия</div>
            <div class="actions-grid">
                <div class="action-card" data-page="create_deal">
                    <div class="action-icon">➕</div>
                    <div class="action-name">Создать сделку</div>
                </div>
                <div class="action-card" data-page="deals">
                    <div class="action-icon">📋</div>
                    <div class="action-name">Мои сделки</div>
                </div>
                <div class="action-card" data-page="profile">
                    <div class="action-icon">👤</div>
                    <div class="action-name">Профиль</div>
                </div>
                <div class="action-card" data-page="premium">
                    <div class="action-icon">⭐</div>
                    <div class="action-name">Premium</div>
                </div>
                <div class="action-card" data-page="referral">
                    <div class="action-icon">👥</div>
                    <div class="action-name">Рефералы</div>
                </div>
            </div>
        </div>

        <!-- Нижняя навигация -->
        <div class="bottom-nav">
            <div class="nav-item active" data-page="home">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Главная</span>
            </div>
            <div class="nav-item" data-page="deals">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Сделки</span>
            </div>
            <div class="nav-item" data-page="profile">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Профиль</span>
            </div>
            <div class="nav-item" data-page="premium">
                <span class="nav-icon">⭐</span>
                <span class="nav-label">Premium</span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
