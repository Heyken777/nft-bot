<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Premium — Novix Gift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: #0a0a12; }
        .glass { background: rgba(10,10,18,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); }
        .plan-card { transition: all 0.2s ease; cursor: pointer; }
        .plan-card.selected { border-color: #f59e0b; box-shadow: 0 0 15px rgba(245,158,11,0.3); background: rgba(245,158,11,0.1); }
        .currency-btn { transition: all 0.2s ease; cursor: pointer; }
        .currency-btn.active { background: rgba(245,158,11,0.2); border-color: #f59e0b; color: #f59e0b; box-shadow: 0 0 10px rgba(245,158,11,0.2); }
        .total-balance { transition: all 0.3s ease; }
        .total-balance.enough { border-color: rgba(16,185,129,0.3); }
        .total-balance.not-enough { border-color: rgba(239,68,68,0.3); }
    </style>
</head>
<body class="bg-[#0a0a12] text-white">
    <div class="max-w-md mx-auto min-h-screen flex flex-col">

        <div class="glass px-5 pt-6 pb-3 border-b border-white/10">
            <div class="flex items-center gap-3">
                <button onclick="window.history.back()" class="text-[#00f2fe] text-xl">←</button>
                <h1 class="text-xl font-bold" style="text-shadow:0 0 10px #00f2fe,0 0 20px #00f2fe66">⭐ Premium подписка</h1>
            </div>
        </div>

        <div class="flex-1 px-5 py-5 space-y-5 overflow-y-auto pb-24">

            <div class="glass rounded-2xl p-5 border border-white/10">
                <div class="font-bold text-center mb-3">✨ Что даёт Premium?</div>
                <div class="space-y-2 text-sm">
                    <div class="flex items-center gap-2">• Комиссия при сделках: <strong class="text-emerald-400">0%</strong></div>
                    <div class="flex items-center gap-2">• Комиссия при выводе: <strong class="text-emerald-400">0%</strong></div>
                    <div class="flex items-center gap-2">• Приоритетная поддержка 24/7</div>
                    <div class="flex items-center gap-2">• Выделенный значок в профиле</div>
                </div>
            </div>

            <div class="glass rounded-2xl p-4 border border-[#f59e0b]/30 text-center" id="currentPremiumCard">
                <div class="text-2xl mb-1">⭐</div>
                <div class="font-semibold" id="premiumStatusText">Загрузка...</div>
                <div class="text-xs text-gray-500 mt-1" id="premiumExpiresText"></div>
            </div>

            <div class="glass rounded-xl p-4 border border-white/10" id="totalBalanceSection">
                <div class="flex justify-between items-center">
                    <span class="text-sm text-gray-400">💰 Общий баланс в RUB:</span>
                    <span class="text-lg font-bold" id="totalBalanceRub">0</span>
                </div>
                <div class="text-xs text-gray-500 mt-1" id="balanceBreakdown"></div>
            </div>

            <div class="space-y-2">
                <div class="text-sm font-semibold">💱 Валюта оплаты</div>
                <div class="flex gap-2 flex-wrap" id="currencySelect"></div>
            </div>

            <div class="space-y-2">
                <div class="text-sm font-semibold">📅 Длительность</div>
                <div id="plansList" class="space-y-2"></div>
            </div>

            <div id="priceSummary" class="text-center text-sm text-gray-400"></div>

            <button class="w-full bg-gradient-to-r from-[#f59e0b] to-[#ec4899] py-3 rounded-xl font-bold shadow-[0_0_15px_rgba(245,158,11,0.5)]" id="buyPremiumBtn">
                💎 Купить Premium
            </button>

            <div id="purchaseError" class="text-center text-xs text-red-400 hidden"></div>

        </div>

        <div class="glass border-t border-white/10 py-2 px-4 fixed bottom-0 max-w-md w-full z-20">
            <div class="flex justify-around items-center">
                <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="window.location.href='index.html'">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
                    <span class="text-[9px] text-gray-400">Главная</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="window.location.href='deals.html'">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25"/></svg>
                    <span class="text-[9px] text-gray-400">Сделки</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="window.location.href='referral.html'">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    <span class="text-[9px] text-gray-400">Рефералы</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer" onclick="window.location.href='profile.html'">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
                    <span class="text-[9px] text-gray-400">Профиль</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer active">
                    <svg class="w-5 h-5 text-[#00f2fe]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.562.562 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.562.562 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>
                    <span class="text-[9px] text-[#00f2fe]">Premium</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const userId = tg.initDataUnsafe?.user?.id || 0;
        const prices = {30: 299, 45: 419, 60: 559, 90: 799, 365: 2999};
        const planLabels = {30: '30 дней', 45: '45 дней', 60: '60 дней', 90: '90 дней', 365: '👑 FOREVER'};
        const planBadges = {45: '⚡ Экономия 10%', 60: '⚡ Экономия 15%', 90: '⚡ Экономия 20%', 365: '⚡ Лучшая цена!'};
        const currencySymbols = {RUB: '🇷🇺', USD: '🇺🇸', EUR: '🇪🇺', UAH: '🇺🇦', KZT: '🇰🇿', UZS: '🇺🇿', BYN: '🇧🇾', TON: '💎', USDT: '💵', STARS: '⭐️'};
        const allCurrencies = ['RUB', 'USD', 'EUR', 'UAH', 'KZT', 'UZS', 'BYN', 'TON', 'USDT', 'STARS'];
        const deductionCurrencies = ['RUB', 'USD', 'EUR', 'USDT', 'TON', 'STARS', 'BYN', 'UAH', 'KZT', 'UZS'];

        let state = {
            selectedCurrency: 'RUB',
            selectedDays: 30,
            balances: {},
            rates: {RUB: 1, USD: 73, EUR: 83, TON: 120, USDT: 73, STARS: 2, UAH: 1.6, KZT: 0.15, UZS: 0.0061, BYN: 26},
            isPremium: false,
            premiumUntil: null,
        };

        function navigateTo(page) {
            const pages = { home: 'index.html', deals: 'deals.html', profile: 'profile.html', premium: 'premium.html', referral: 'referral.html' };
            window.location.href = pages[page] || 'index.html';
        }

        function fmt(n) { return (n || 0).toLocaleString('ru-RU', {minimumFractionDigits:2, maximumFractionDigits:2}); }

        function calculateTotalRub() {
            let total = 0;
            for (const curr of allCurrencies) {
                const amt = state.balances[curr] || 0;
                if (curr === 'RUB') total += amt;
                else total += amt * (state.rates[curr] || 0);
            }
            return total;
        }

        function getBreakdown() {
            const parts = [];
            for (const curr of allCurrencies) {
                const amt = state.balances[curr] || 0;
                if (amt > 0) {
                    parts.push(`${fmt(amt)} ${curr}`);
                }
            }
            return parts.join(' + ') || 'Нет средств';
        }

        function getPriceRub() {
            return prices[state.selectedDays] || 299;
        }

        function getPriceInCurrency() {
            const rate = state.rates[state.selectedCurrency] || 1;
            return Math.floor(getPriceRub() / rate);
        }

        function renderCurrencies() {
            const container = document.getElementById('currencySelect');
            container.innerHTML = allCurrencies.map(c => `
                <button class="currency-btn px-4 py-1.5 rounded-full text-sm bg-white/5 border border-white/10 text-white ${c === state.selectedCurrency ? 'active' : ''}" data-currency="${c}">
                    ${currencySymbols[c] || c} ${c}
                </button>
            `).join('');
            container.querySelectorAll('.currency-btn').forEach(btn => {
                btn.onclick = () => {
                    state.selectedCurrency = btn.dataset.currency;
                    renderCurrencies();
                    renderPlans();
                    updatePriceSummary();
                };
            });
        }

        function renderPlans() {
            const container = document.getElementById('plansList');
            const rate = state.rates[state.selectedCurrency] || 1;
            container.innerHTML = Object.entries(prices).map(([days, rubPrice]) => {
                const price = Math.floor(rubPrice / rate);
                const selected = parseInt(days) === state.selectedDays;
                const badge = planBadges[days];
                return `
                    <div class="plan-card glass rounded-xl p-3 border ${selected ? 'selected' : 'border-white/10'}" data-days="${days}">
                        <div class="flex justify-between items-center">
                            <div>
                                <span class="font-medium">${planLabels[days]}</span>
                                ${badge ? `<div class="text-xs text-emerald-400 mt-0.5">${badge}</div>` : ''}
                            </div>
                            <div class="text-[#f59e0b] font-bold">${price.toLocaleString()} ${state.selectedCurrency}</div>
                        </div>
                    </div>
                `;
            }).join('');
            container.querySelectorAll('.plan-card').forEach(card => {
                card.onclick = () => {
                    state.selectedDays = parseInt(card.dataset.days);
                    renderPlans();
                    updatePriceSummary();
                };
            });
        }

        function updatePriceSummary() {
            const priceRub = getPriceRub();
            const totalRub = calculateTotalRub();
            const enough = totalRub >= priceRub;
            const priceInCurr = getPriceInCurrency();

            document.getElementById('priceSummary').innerHTML = `
                💳 Стоимость: <strong>${priceInCurr.toLocaleString()} ${state.selectedCurrency}</strong>
                ≈ <strong>${fmt(priceRub)} RUB</strong>
            `;

            const section = document.getElementById('totalBalanceSection');
            document.getElementById('totalBalanceRub').textContent = fmt(totalRub) + ' RUB';
            document.getElementById('balanceBreakdown').textContent = getBreakdown();

            if (state.isPremium) {
                document.getElementById('buyPremiumBtn').disabled = true;
                document.getElementById('buyPremiumBtn').className = 'w-full bg-gray-600 py-3 rounded-xl font-bold opacity-50';
                document.getElementById('buyPremiumBtn').textContent = '✅ Premium уже активен';
                document.getElementById('purchaseError').classList.add('hidden');
                return;
            }

            if (enough) {
                section.className = 'glass rounded-xl p-4 border border-emerald-500/30 total-balance enough';
                document.getElementById('buyPremiumBtn').disabled = false;
                document.getElementById('buyPremiumBtn').className = 'w-full bg-gradient-to-r from-[#f59e0b] to-[#ec4899] py-3 rounded-xl font-bold shadow-[0_0_15px_rgba(245,158,11,0.5)]';
                document.getElementById('buyPremiumBtn').textContent = `💎 Купить за ${fmt(totalRub)} RUB`;
                document.getElementById('purchaseError').classList.add('hidden');
            } else {
                section.className = 'glass rounded-xl p-4 border border-red-500/30 total-balance not-enough';
                document.getElementById('buyPremiumBtn').disabled = true;
                document.getElementById('buyPremiumBtn').className = 'w-full bg-gray-600 py-3 rounded-xl font-bold opacity-50';
                document.getElementById('buyPremiumBtn').textContent = '❌ Недостаточно средств';
                document.getElementById('purchaseError').innerHTML = '😕 У вас недостаточно средств.<br>Пожалуйста, пополните баланс через поддержку: <a href="https://t.me/NovixProHelp" class="text-blue-400">@NovixProHelp</a>';
                document.getElementById('purchaseError').classList.remove('hidden');
            }
        }

        async function loadData() {
            try {
                const resp = await fetch(`/api/user?user_id=${userId}`);
                if (resp.ok) {
                    const data = await resp.json();
                    state.balances = data.balances || {};
                    if (data.rates) state.rates = {...state.rates, ...data.rates};
                    state.isPremium = data.is_premium || false;
                    state.premiumUntil = data.premium_until || null;

                    const statusEl = document.getElementById('premiumStatusText');
                    const expiresEl = document.getElementById('premiumExpiresText');
                    if (state.isPremium) {
                        statusEl.textContent = '⭐ Premium активен';
                        statusEl.className = 'font-semibold text-amber-400';
                        if (state.premiumUntil) {
                            expiresEl.textContent = `Действует до: ${state.premiumUntil}`;
                        }
                    } else {
                        statusEl.textContent = 'Premium не активен';
                        statusEl.className = 'font-semibold text-gray-400';
                        expiresEl.textContent = '';
                    }
                }
            } catch (e) {
                console.error('Load error:', e);
            }
            renderCurrencies();
            renderPlans();
            updatePriceSummary();
        }

        document.getElementById('buyPremiumBtn').onclick = async () => {
            if (state.isPremium) return;

            const btn = document.getElementById('buyPremiumBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Обработка...';

            try {
                const resp = await fetch('/api/buy_premium', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId,
                        days: state.selectedDays
                    })
                });
                const result = await resp.json();

                if (result.success) {
                    tg.showPopup({
                        title: '✅ Premium активирован!',
                        message: `Поздравляем! Подписка на ${state.selectedDays === 365 ? 'постоянную' : state.selectedDays + ' дней'} Premium активирована.\n\nСписано: ${result.deducted ? Object.entries(result.deducted).map(([c,a]) => `${fmt(a)} ${c}`).join(', ') : result.price_rub + ' RUB'}`,
                        buttons: [{id: 'ok', type: 'default', text: '✅ Отлично!'}]
                    }, () => navigateTo('profile'));
                } else {
                    const errEl = document.getElementById('purchaseError');
                    errEl.innerHTML = '❌ ' + (result.error || 'Ошибка при покупке');
                    errEl.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = '💎 Попробовать снова';
                }
            } catch (e) {
                console.error('Buy error:', e);
                const errEl = document.getElementById('purchaseError');
                errEl.innerHTML = '❌ Ошибка соединения с сервером. Попробуйте позже.';
                errEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = '💎 Купить Premium';
            }
        };

        loadData();
    </script>
    <script src="animations.js"></script>
</body>
</html>
